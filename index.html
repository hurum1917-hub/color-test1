<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест на внимательность: Баттл</title>
    <style>
        body { font-family: sans-serif; background: #1a2a3a; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: white; color: #333; border-radius: 25px; padding: 20px; max-width: 500px; margin: auto; }
        .stimulus { font-size: 4rem; font-weight: bold; margin: 30px 0; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; font-size: 1.2rem; border-radius: 50px; border: none; cursor: pointer; background: #4a90e2; color: white; font-weight: bold; }
        .res-box { background: #ffd700; color: black; padding: 20px; border-radius: 15px; font-size: 1.5rem; margin-top: 20px; display: none; }
        .info { margin-bottom: 10px; font-size: 1.1rem; color: #666; }
    </style>
</head>
<body>

<div class="card" id="game-container">
    <div id="setup">
        <h1>Баттл: Угадай цвет</h1>
        <p>10 вопросов. Нужно нажимать на ЦВЕТ, а не на слово.</p>
        <input type="text" id="userName" placeholder="Ваше имя" style="padding:15px; width:80%; border-radius:30px; border:1px solid #ccc; margin-bottom:10px;">
        <button onclick="startGame()">НАЧАТЬ ТЕСТ</button>
    </div>

    <div id="quiz" style="display:none;">
        <div class="info" id="progress">Вопрос 1/10</div>
        <div class="stimulus" id="stimulus-item">---</div>
        <div class="btns">
            <button onclick="checkAnswer('красный')" style="background:#e63946">КРАСНЫЙ</button>
            <button onclick="checkAnswer('жёлтый')" style="background:#f4d03f; color:black">ЖЁЛТЫЙ</button>
            <button onclick="checkAnswer('зелёный')" style="background:#2ecc71">ЗЕЛЁНЫЙ</button>
            <button onclick="checkAnswer('синий')" style="background:#3498db">СИНИЙ</button>
        </div>
    </div>

    <div id="res-box" class="res-box">
        <strong>ТЕСТ ЗАВЕРШЕН!</strong><br>
        <span id="final-result"></span>
    </div>
</div>

<script>
    const COLORS = ['красный', 'жёлтый', 'зелёный', 'синий'];
    const SYMBOLS = ['★', '♦', '♣', '♠', '✖'];
    let questions = [];
    let currentIdx = 0;
    let score = 0;
    let startTime;

    function startGame() {
        const name = document.getElementById('userName').value;
        if (!name) return alert("Введите имя!");
        
        // Генерируем 5 слов и 5 символов
        questions = [];
        for(let i=0; i<5; i++) {
            let word = COLORS[Math.floor(Math.random()*4)];
            let color = COLORS.filter(c => c !== word)[Math.floor(Math.random()*3)];
            questions.push({ text: word, color: color });
        }
        for(let i=0; i<5; i++) {
            questions.push({ text: SYMBOLS[Math.floor(Math.random()*5)], color: COLORS[Math.floor(Math.random()*4)] });
        }
        questions.sort(() => Math.random() - 0.5);

        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        startTime = Date.now();
        showNext();
    }

    function showNext() {
        if (currentIdx >= 10) return finish();
        const q = questions[currentIdx];
        const el = document.getElementById('stimulus-item');
        el.innerText = q.text;
        el.style.color = getHex(q.color);
        document.getElementById('progress').innerText = `Вопрос ${currentIdx + 1} / 10`;
    }

    function checkAnswer(ans) {
        if (ans === questions[currentIdx].color) score++;
        currentIdx++;
        showNext();
    }

    function getHex(name) {
        const map = { 'красный': '#e63946', 'жёлтый': '#f4d03f', 'зелёный': '#2ecc71', 'синий': '#3498db' };
        return map[name];
    }

    function finish() {
        const time = ((Date.now() - startTime) / 1000).toFixed(1);
        const name = document.getElementById('userName').value.toUpperCase();
        document.getElementById('quiz').style.display = 'none';
        const resBox = document.getElementById('res-box');
        resBox.style.display = 'block';
        document.getElementById('final-result').innerHTML = `${name}: ${score}/10 за ${time} сек.`;
    }
</script>
</body>
</html>
