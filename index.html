<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тест: Угадай цвет</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* предотвращает выделение текста при тапах */
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Основной контейнер */
        .app-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Карточки */
        .card {
            background: #fff;
            border-radius: 32px;
            padding: 24px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1, h2 {
            margin: 0 0 16px 0;
            font-weight: 700;
            color: #1e2f3e;
        }

        /* Поля ввода */
        input {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            border: 2px solid #ccc;
            border-radius: 60px;
            text-align: center;
            font-weight: 500;
            margin-bottom: 20px;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #4a90e2;
        }

        /* Кнопки */
        button {
            background: #4a90e2;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 16px 20px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin-top: 8px;
            touch-action: manipulation;
        }
        button:active {
            transform: scale(0.97);
            background: #2c6cb0;
        }

        /* Группа кнопок цветов (сетка) */
        .color-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 24px;
        }
        .color-btn {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 20px 12px;
            border-radius: 60px;
            background: #f0f0f0;
            color: #1e2f3e;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: 0.05s linear;
        }
        .color-btn:active {
            transform: scale(0.96);
        }

        /* слово-стимул */
        .stimulus-word {
            font-size: 3.2rem;
            font-weight: 800;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 48px;
            letter-spacing: 2px;
            text-transform: uppercase;
            word-break: break-word;
        }

        /* Прогресс и таймер */
        .info-bar {
            display: flex;
            justify-content: space-between;
            background: #e9ecef;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Таблица лидеров */
        .leaderboard {
            margin-top: 20px;
            background: #fef9e6;
            border-radius: 28px;
            padding: 16px;
            text-align: left;
        }
        .leaderboard table {
            width: 100%;
            border-collapse: collapse;
        }
        .leaderboard th, .leaderboard td {
            padding: 12px 8px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        .leaderboard th {
            background: #ffd966;
            border-radius: 20px 20px 0 0;
        }
        .leaderboard tr:last-child td {
            border-bottom: none;
        }

        .restart-btn {
            background: #34a853;
            margin-top: 12px;
        }

        .error {
            color: #d32f2f;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* Адаптация для совсем маленьких */
        @media (max-width: 480px) {
            .stimulus-word {
                font-size: 2.4rem;
            }
            .color-btn {
                font-size: 1.2rem;
                padding: 14px 8px;
            }
            button {
                font-size: 1.1rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <!-- сюда динамически будет рендериться интерфейс -->
</div>

<script>
    // ---------- ЦВЕТА ДЛЯ ЭКСПЕРИМЕНТА ----------
    const COLOR_NAMES = ['красный', 'жёлтый', 'зелёный', 'синий'];
    // соответствие цветов для текста (CSS)
    const colorMap = {
        'красный': '#e63946',
        'жёлтый': '#f4d03f',
        'зелёный': '#2ecc71',
        'синий': '#3498db'
    };

    // ---------- Генерация 10 заданий (эффект Струпа) ----------
    function generateQuestions(n = 10) {
        const questions = [];
        for (let i = 0; i < n; i++) {
            // выбираем случайное слово (значение)
            const wordValue = COLOR_NAMES[Math.floor(Math.random() * COLOR_NAMES.length)];
            // выбираем случайный цвет текста (отличный от значения слова, чтобы был эффект)
            let textColor = COLOR_NAMES[Math.floor(Math.random() * COLOR_NAMES.length)];
            while (textColor === wordValue) {
                textColor = COLOR_NAMES[Math.floor(Math.random() * COLOR_NAMES.length)];
            }
            questions.push({
                word: wordValue,       // что написано (например "красный")
                color: textColor,      // цвет букв (например "жёлтый")
                correctAnswer: textColor   // правильный ответ — цвет букв
            });
        }
        return questions;
    }

    // ---------- Хранилище лидеров ----------
    let leaderboard = [];

    function loadLeaderboard() {
        const stored = localStorage.getItem('colorTestLeaderboard');
        if (stored) {
            try {
                leaderboard = JSON.parse(stored);
            } catch(e) { leaderboard = []; }
        } else {
            leaderboard = [];
        }
        // сортировка: по правильным (убыв), затем по времени (возр)
        sortLeaderboard();
    }

    function sortLeaderboard() {
        leaderboard.sort((a,b) => {
            if (a.score !== b.score) return b.score - a.score;
            return a.time - b.time;
        });
    }

    function saveLeaderboard() {
        sortLeaderboard();
        localStorage.setItem('colorTestLeaderboard', JSON.stringify(leaderboard));
    }

    function addResult(name, score, timeSec) {
        leaderboard.push({ name, score, time: timeSec });
        saveLeaderboard();
    }

    // ---------- Состояние приложения ----------
    let currentUser = null;      // имя
    let currentScreen = 'register'; // register, mainMenu, test
    let testQuestions = [];
    let currentQuestionIndex = 0;
    let correctCount = 0;
    let testStartTime = null;
    let testTimerInterval = null;
    let currentTestTime = 0;      // секунд во время теста (для отображения)

    // DOM элемент
    const appEl = document.getElementById('app');

    // ---------- Рендер в зависимости от экрана ----------
    function render() {
        if (currentScreen === 'register') {
            renderRegister();
        } else if (currentScreen === 'mainMenu') {
            renderMainMenu();
        } else if (currentScreen === 'test') {
            renderTest();
        }
    }

    function renderRegister() {
        appEl.innerHTML = `
            <div class="card">
                <h1>🎨 Тест "Угадай цвет"</h1>
                <p style="margin-bottom: 20px;">Введите ваше имя, чтобы начать</p>
                <input type="text" id="usernameInput" placeholder="Ваше имя" maxlength="20" autocomplete="off">
                <button id="registerBtn">Войти</button>
                <div id="regError" class="error"></div>
            </div>
        `;
        const input = document.getElementById('usernameInput');
        const btn = document.getElementById('registerBtn');
        const errorDiv = document.getElementById('regError');

        function tryRegister() {
            let name = input.value.trim();
            if (name.length < 2) {
                errorDiv.innerText = 'Имя должно содержать минимум 2 символа';
                return;
            }
            currentUser = name;
            localStorage.setItem('colorTestUserName', currentUser);
            currentScreen = 'mainMenu';
            render();
        }

        btn.addEventListener('click', tryRegister);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') tryRegister();
        });
    }

    function renderMainMenu() {
        // обновляем таблицу лидеров перед показом
        loadLeaderboard();
        const leaderboardHtml = generateLeaderboardHTML();

        appEl.innerHTML = `
            <div class="card">
                <div class="info-bar">
                    <span>👤 ${escapeHtml(currentUser)}</span>
                    <span>🏆 Лидеры</span>
                </div>
                <h2>Готов пройти тест?</h2>
                <p>10 вопросов на внимательность.<br>Нажимай на <strong>цвет текста</strong>, а не значение слова!</p>
                <button id="startTestBtn">🚀 СТАРТ</button>
                
                <div class="leaderboard">
                    <h3>📋 Таблица лидеров</h3>
                    ${leaderboardHtml}
                </div>
                <button id="resetLeaderboardBtn" style="background:#e67e22; margin-top: 12px;">Сбросить таблицу</button>
            </div>
        `;

        document.getElementById('startTestBtn').addEventListener('click', () => {
            startNewTest();
        });
        const resetBtn = document.getElementById('resetLeaderboardBtn');
        if (resetBtn) {
            resetBtn.addEventListener('click', () => {
                if (confirm('Удалить все результаты из таблицы лидеров?')) {
                    leaderboard = [];
                    saveLeaderboard();
                    render(); // обновить главное меню
                }
            });
        }
    }

    function generateLeaderboardHTML() {
        if (!leaderboard.length) {
            return '<p style="text-align:center;">Пока нет результатов. Пройдите тест!</p>';
        }
        let html = '<table><tr><th>#</th><th>Имя</th><th>✅ Очки</th><th>⏱️ Время (сек)</th></tr>';
        leaderboard.slice(0, 10).forEach((entry, idx) => {
            html += `<tr>
                        <td>${idx+1}</td>
                        <td>${escapeHtml(entry.name)}</td>
                        <td>${entry.score}/10</td>
                        <td>${entry.time}</td>
                     </tr>`;
        });
        html += '</table>';
        return html;
    }

    function startNewTest() {
        testQuestions = generateQuestions(10);
        currentQuestionIndex = 0;
        correctCount = 0;
        testStartTime = Date.now();
        currentTestTime = 0;
        if (testTimerInterval) clearInterval(testTimerInterval);
        testTimerInterval = setInterval(() => {
            if (currentScreen === 'test') {
                const elapsed = Math.floor((Date.now() - testStartTime) / 1000);
                currentTestTime = elapsed;
                // обновляем таймер на экране если он виден
                const timerSpan = document.getElementById('testTimer');
                if (timerSpan) timerSpan.innerText = `${currentTestTime} сек`;
            }
        }, 200);
        currentScreen = 'test';
        render();
    }

    function renderTest() {
        if (currentQuestionIndex >= testQuestions.length) {
            // тест завершён
            finishTest();
            return;
        }

        const q = testQuestions[currentQuestionIndex];
        const progress = `${currentQuestionIndex+1} / ${testQuestions.length}`;
        const elapsedNow = Math.floor((Date.now() - testStartTime) / 1000);

        appEl.innerHTML = `
            <div class="card">
                <div class="info-bar">
                    <span>👤 ${escapeHtml(currentUser)}</span>
                    <span>✅ ${correctCount}</span>
                    <span id="testTimer">⏱️ ${elapsedNow} сек</span>
                </div>
                <div class="info-bar" style="background:#d9e3ec;">
                    <span>Вопрос ${progress}</span>
                    <span>🎯 Выбери ЦВЕТ текста</span>
                </div>
                <div class="stimulus-word" style="color: ${colorMap[q.color]}; background:#fff; border: 2px solid #ddd;">
                    ${q.word}
                </div>
                <div class="color-buttons" id="colorOptions">
                    ${COLOR_NAMES.map(col => `<button class="color-btn" data-color="${col}">${col.toUpperCase()}</button>`).join('')}
                </div>
            </div>
        `;

        // обработка нажатий на цвета
        const buttons = document.querySelectorAll('.color-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const selectedColor = btn.getAttribute('data-color');
                // проверка правильности: правильный ответ — это цвет букв (q.correctAnswer)
                if (selectedColor === q.correctAnswer) {
                    correctCount++;
                }
                // переходим к следующему вопросу
                nextQuestion();
            });
        });
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < testQuestions.length) {
            renderTest();
        } else {
            finishTest();
        }
    }

    function finishTest() {
        if (testTimerInterval) {
            clearInterval(testTimerInterval);
            testTimerInterval = null;
        }
        const endTime = Math.floor((Date.now() - testStartTime) / 1000);
        const finalScore = correctCount;
        // сохраняем результат в таблицу лидеров
        addResult(currentUser, finalScore, endTime);
        currentScreen = 'mainMenu';
        render();
        // небольшое всплывающее уведомление о результате
        setTimeout(() => {
            alert(`Тест завершён!\nВаш результат: ${finalScore} из 10\nВремя: ${endTime} секунд`);
        }, 50);
    }

    // простая защита от XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // ---------- Инициализация приложения ----------
    function init() {
        loadLeaderboard();
        const savedName = localStorage.getItem('colorTestUserName');
        if (savedName && savedName.length >= 2) {
            currentUser = savedName;
            currentScreen = 'mainMenu';
        } else {
            currentScreen = 'register';
        }
        render();
    }

    init();
</script>
</body>
</html>
